name: Check upstream revisions

on:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Update pinned upstream commits
        id: update
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/update-upstreams.mjs
      - run: npm run check
      - name: Create tested update pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/upstream-runtime
          delete-branch: true
          commit-message: "build(deps): update mpv and LibreMPEG revisions"
          title: "build(deps): update mpv and LibreMPEG revisions"
          body: |
            Automated upstream revision update.

            The runtime CI must build the pinned commits and pass the Windows
            libmpv/AC-4 verification before this change is merged.
          labels: dependencies

